<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Sergio Portfolio</title>
    <script type="text/javascript">
      // Este script guarda la ruta que causó el 404 y redirige al index.html
      // para que React Router pueda leerla después.
      var pathSegmentsToKeep = 1; // Pon 1 si tu URL es usuario.github.io/portfolio/

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
